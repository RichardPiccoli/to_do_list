# render.yaml

services:
  - type: web
    name: to_do_list
    runtime: ruby
    plan: free
    buildCommand: |
      bundle install
      bundle exec rake assets:precompile
      bundle exec rake db:migrate
    startCommand: bundle exec rails server -b 0.0.0.0 -p 10000
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: to_do_list_db
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false
      - key: SECRET_KEY_BASE
        generateValue: true

databases:
  - name: to_do_list_db
    plan: free